naftiko: 1.0.0-alpha2
info:
  label: Assembled Assist API — Articles
  description: 'Assembled Assist API — Articles. Knowledge articles that AI Agents draw from.'
  tags: [Assembled, Assist, Knowledge]
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
  - namespace: env
    keys:
      ASSEMBLED_API_KEY: ASSEMBLED_API_KEY
capability:
  consumes:
    - type: http
      namespace: assist-articles
      baseUri: https://api.assembledhq.com
      description: Assembled Assist Articles capability.
      resources:
        - name: v0-assist-articles
          path: /v0/assist/articles
          operations:
            - { name: createassistarticle, method: POST, description: Assembled Create Assist Article, outputRawFormat: json, outputParameters: [{ name: result, type: object, value: $. }] }
        - name: v0-assist-articles-id
          path: /v0/assist/articles/{id}
          operations:
            - { name: updateassistarticle, method: PUT, description: Assembled Update Assist Article, outputRawFormat: json, outputParameters: [{ name: result, type: object, value: $. }] }
            - { name: deleteassistarticle, method: DELETE, description: Assembled Delete Assist Article, outputRawFormat: json, outputParameters: [{ name: result, type: object, value: $. }] }
      authentication:
        type: basic
        username: '{{env.ASSEMBLED_API_KEY}}'
        password: ''
  exposes:
    - type: mcp
      namespace: assist-articles-mcp
      port: 9090
      transport: http
      description: MCP adapter for Assembled Assist Articles.
      tools:
        - { name: assembled-create-assist-article, description: Assembled Create Assist Article, hints: { readOnly: false, destructive: false, idempotent: false }, call: assist-articles.createassistarticle, outputParameters: [{ type: object, mapping: $. }] }
        - { name: assembled-update-assist-article, description: Assembled Update Assist Article, hints: { readOnly: false, destructive: false, idempotent: true }, call: assist-articles.updateassistarticle, outputParameters: [{ type: object, mapping: $. }] }
        - { name: assembled-delete-assist-article, description: Assembled Delete Assist Article, hints: { readOnly: false, destructive: true, idempotent: true }, call: assist-articles.deleteassistarticle, outputParameters: [{ type: object, mapping: $. }] }
