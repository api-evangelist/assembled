naftiko: 1.0.0-alpha2
info:
  label: Assembled Filters API — Sites
  description: 'Assembled Filters API — Sites. CRUD for the Sites organizational filter.'
  tags: [Assembled, Sites]
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
  - namespace: env
    keys:
      ASSEMBLED_API_KEY: ASSEMBLED_API_KEY
capability:
  consumes:
    - type: http
      namespace: filters-sites
      baseUri: https://api.assembledhq.com
      description: Assembled Sites capability.
      resources:
        - name: v0-sites
          path: /v0/sites
          operations:
            - { name: listsites, method: GET, description: Assembled List Sites, outputRawFormat: json, outputParameters: [{ name: result, type: object, value: $. }] }
            - { name: createsite, method: POST, description: Assembled Create Site, outputRawFormat: json, outputParameters: [{ name: result, type: object, value: $. }] }
            - { name: deletesites, method: DELETE, description: Assembled Delete Sites, outputRawFormat: json, outputParameters: [{ name: result, type: object, value: $. }] }
        - name: v0-sites-id
          path: /v0/sites/{id}
          operations:
            - { name: updatesite, method: PUT, description: Assembled Update Site, outputRawFormat: json, outputParameters: [{ name: result, type: object, value: $. }] }
      authentication:
        type: basic
        username: '{{env.ASSEMBLED_API_KEY}}'
        password: ''
  exposes:
    - type: mcp
      namespace: filters-sites-mcp
      port: 9090
      transport: http
      description: MCP adapter for Assembled Sites.
      tools:
        - { name: assembled-list-sites, description: Assembled List Sites, hints: { readOnly: true, destructive: false, idempotent: true }, call: filters-sites.listsites, outputParameters: [{ type: object, mapping: $. }] }
        - { name: assembled-create-site, description: Assembled Create Site, hints: { readOnly: false, destructive: false, idempotent: false }, call: filters-sites.createsite, outputParameters: [{ type: object, mapping: $. }] }
        - { name: assembled-update-site, description: Assembled Update Site, hints: { readOnly: false, destructive: false, idempotent: true }, call: filters-sites.updatesite, outputParameters: [{ type: object, mapping: $. }] }
        - { name: assembled-delete-sites, description: Assembled Delete Sites, hints: { readOnly: false, destructive: true, idempotent: true }, call: filters-sites.deletesites, outputParameters: [{ type: object, mapping: $. }] }
